    engine: github
    shortcut: gh
    categories: [it, repos]
    disabled: false

  - name: stackoverflow
    engine: stackoverflow
    shortcut: st
    categories: [it, qna]
    disabled: false

  - name: huggingface
    engine: huggingface
    shortcut: hf
    categories: [it, repos]
    disabled: false

  - name: huggingface datasets
    engine: huggingface_datasets
    shortcut: hfd
