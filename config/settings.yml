# SearXNG 搜索引擎配置
# MoKangMedical 集成搜索引擎

general:
  instance_name: "MoKangMedical Search"
  debug: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "zh-CN"

engines:
  - name: google
    engine: google
    shortcut: go
    disabled: false
  - name: pubmed
    engine: xpath
    shortcut: pub
    search_url: "https://pubmed.ncbi.nlm.nih.gov/?term={query}"
  - name: clinicaltrials
    engine: xpath
    shortcut: ct
    search_url: "https://clinicaltrials.gov/search?term={query}"
