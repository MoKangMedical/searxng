# SearXNG Settings - 国内优化版 v2.0
# 整合本地运行配置 + GitHub项目配置
# 修复: 移除会导致ValueError的default_lang/default_locale

use_default_settings: true

general:
  debug: false
  instance_name: "SearXNG Medical AI"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "ultrasecretkey_change_me_to_random_string_1234567890"
  limiter: false
  image_proxy: true
  method: "GET"
  formats:
    - html
    - json

search:
  formats:
    - html
    - json
    - csv
    - rss
  safe_search: 0
  concurrent_requests_per_engine: 5
  max_request_timeout: 5.0
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

redis:
  url: "redis://redis:6379/0"

cache:
  cache_server: "redis://redis:6379/1"
  expire: 86400

ui:
  static_use_hash: true
  infinite_scroll: true
  center_alignment: true
  query_in_title: true
  results_on_new_tab: false
  theme_args:
    simple_style: auto

engines:
  # === 国内通用搜索引擎 ===
  - name: baidu
    engine: baidu
    shortcut: bd
    categories: [general]
    disabled: false
    timeout: 4.0

  - name: sogou
    engine: sogou
    shortcut: sg
    categories: [general]
    disabled: false
    timeout: 4.0

  - name: 360search
    engine: 360search
    shortcut: 360
    categories: [general]
    disabled: false
    timeout: 4.0

  # === 国际通用搜索引擎 ===
  - name: google
    engine: google
    shortcut: go
    categories: [general]
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    categories: [general]
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    categories: [general]
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    categories: [general]
    disabled: false

  # === 学术搜索 ===
  - name: google scholar
    engine: google_scholar
    shortcut: gs
    categories: [science, scientific publications]
    disabled: false

  - name: semantic scholar
    engine: semanticscholar
    shortcut: ss
    categories: [science, scientific publications]
    disabled: false

  - name: arxiv
    engine: arxiv
    shortcut: arx
    categories: [science, scientific publications]
    disabled: false

  # === 知识库 ===
