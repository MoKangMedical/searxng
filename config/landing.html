<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearXNG Medical AI - 医疗AI智能搜索引擎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 90%;
            text-align: center;
        }
        
        .logo {
            margin-bottom: 30px;
        }
        
        .logo svg {
            width: 80px;
            height: 80px;
        }
        
        .title {
            font-size: 36px;
            font-weight: 700;
            color: #1a73e8;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }
        
        .search-box {
            position: relative;
            margin-bottom: 30px;
        }
        
        .search-box input {
            width: 100%;
            padding: 20px 24px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
        }
        
        .search-box button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-box button:hover {
            background: #1557b0;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .feature-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        
        .feature-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #1a73e8;
        }
        
        .feature-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }
        
        .shortcuts {
            margin-top: 40px;
            text-align: left;
        }
        
        .shortcuts h3 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .shortcut-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .shortcut {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .shortcut code {
            background: #1a73e8;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }
        
        .shortcut span {
            font-size: 14px;
            color: #666;
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 14px;
            color: #999;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            .title {
                font-size: 28px;
            }
            
            .subtitle {
                font-size: 16px;
            }
            
            .search-box input {
                padding: 16px 20px;
                font-size: 16px;
            }
            
            .search-box button {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 100 100" fill="none">
                <defs>
                    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#4285f4;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="45" fill="url(#grad)" opacity="0.1"/>
                <path d="M50 20L20 35l30 15 30-15-30-15z" fill="url(#grad)"/>
                <path d="M20 50l30 15 30-15" stroke="url(#grad)" stroke-width="3" fill="none"/>
                <path d="M20 65l30 15 30-15" stroke="url(#grad)" stroke-width="3" fill="none"/>
                <circle cx="50" cy="45" r="10" fill="url(#grad)"/>
                <path d="M40 45h20M50 35v20" stroke="white" stroke-width="3"/>
            </svg>
        </div>
        
        <h1 class="title">SearXNG Medical AI</h1>
        <p class="subtitle">医疗AI智能搜索引擎 - 隐私保护、多源聚合、专业医疗</p>
        
        <form action="/search" method="GET" class="search-box">
            <input type="text" name="q" placeholder="输入搜索关键词..." autocomplete="off" autofocus>
            <button type="submit">搜索</button>
        </form>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <div class="feature-title">多源聚合</div>
                <div class="feature-desc">聚合70+搜索引擎，一次搜索获取全网结果</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🏥</div>
                <div class="feature-title">医疗专业</div>
                <div class="feature-desc">专为医疗AI优化，支持药品、疾病、文献搜索</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-title">隐私保护</div>
                <div class="feature-desc">零追踪、零记录，保护用户搜索隐私</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-title">极速响应</div>
                <div class="feature-desc">毫秒级响应，Redis缓存加速</div>
            </div>
        </div>
        
        <div class="shortcuts">
            <h3>快捷搜索</h3>
            <div class="shortcut-grid">
                <div class="shortcut">
                    <code>!bd</code>
                    <span>百度搜索</span>
                </div>
                <div class="shortcut">
                    <code>!gs</code>
                    <span>学术搜索</span>
                </div>
                <div class="shortcut">
                    <code>!sgw</code>
                    <span>微信搜索</span>
                </div>
                <div class="shortcut">
                    <code>!gh</code>
                    <span>GitHub搜索</span>
                </div>
                <div class="shortcut">
                    <code>!pm</code>
                    <span>PubMed搜索</span>
                </div>
                <div class="shortcut">
                    <code>!hf</code>
                    <span>HuggingFace</span>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Powered by SearXNG | 医疗AI智能搜索引擎</p>
            <p>版本: v3.1 | 响应时间: &lt;0.01s</p>
        </div>
    </div>
</body>
</html>
