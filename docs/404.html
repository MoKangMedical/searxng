<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | SearXNG Medical AI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .container{text-align:center;max-width:600px;padding:40px}
        .code{font-size:120px;font-weight:800;background:linear-gradient(135deg,#1a73e8,#4285f4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;line-height:1}
        h1{font-size:28px;font-weight:700;margin-bottom:12px}
        p{color:#8b949e;font-size:16px;line-height:1.6;margin-bottom:32px}
        .links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
        .links a{padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;transition:all 0.2s}
        .primary{background:linear-gradient(135deg,#1a73e8,#4285f4);color:white}
        .primary:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(26,115,232,0.3)}
        .secondary{border:1px solid #30363d;color:#e6edf3;background:transparent}
        .secondary:hover{border-color:#1a73e8;color:#1a73e8}
        .search-box{margin:30px 0;display:flex;gap:10px;max-width:400px;margin-left:auto;margin-right:auto}
        .search-box input{flex:1;padding:12px 20px;border:2px solid #30363d;border-radius:8px;background:#161b22;color:#e6edf3;font-size:14px;outline:none}
        .search-box input:focus{border-color:#1a73e8}
        .search-box button{padding:12px 20px;background:#1a73e8;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Try searching or go back to the homepage.</p>
        <div class="search-box">
            <input type="text" id="q" placeholder="Search docs..." onkeypress="if(event.key==='Enter')search()">
            <button onclick="search()">Search</button>
        </div>
        <div class="links">
            <a href="index.html" class="primary">Homepage</a>
            <a href="features.html" class="secondary">Features</a>
            <a href="architecture.html" class="secondary">Architecture</a>
            <a href="api-docs.html" class="secondary">API Docs</a>
            <a href="faq.html" class="secondary">FAQ</a>
            <a href="playground.html" class="secondary">Playground</a>
            <a href="https://github.com/SearXNG Medical AI - 医疗AI智能搜索引擎/searxng" class="secondary">GitHub</a>
        </div>
    </div>
    <script>
    function search(){
        const q=document.getElementById('q').value.trim();
        if(q)window.location.href='faq.html?q='+encodeURIComponent(q);
    }
    // Check if there's a query param from old URL
    const params=new URLSearchParams(window.location.search);
    if(params.get('q'))document.getElementById('q').value=params.get('q');
    </script>
</body>
</html>
